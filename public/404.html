<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | 페이지를 찾을 수 없습니다</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: url('assets/images/aurorabg.png') no-repeat center center / cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 0 0 5px black;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }

    .container {
      text-align: center;
    }

    .big-title {
      font-size: 7rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .typing-wrapper {
      height: 3rem;
      overflow: hidden;
    }

    .typing {
      font-size: 2rem;
      border-right: 0.15em solid white;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3s steps(30, end) forwards, blink 0.75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    @media (max-width: 768px) {
      .big-title { font-size: 3.5rem; }
      .typing { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="big-title">404 | Page not found</div>
    <div class="typing-wrapper">
      <div class="typing">이 페이지는 우주 어딘가로 사라졌어요... 👽</div>
    </div>
  </div>
</body>
</html>
